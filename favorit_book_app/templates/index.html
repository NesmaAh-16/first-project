<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-5 shadow rounded">
        <div class="row">
            <div class="col-md-6 border-end">
                <h2 class="text-primary">Registration</h2>
                <form action="/register" method="POST">
                    {% csrf_token %}
                    <input type="text" name="first_name" class="form-control mb-2" placeholder="First Name">
                    <input type="text" name="last_name" class="form-control mb-2" placeholder="Last Name">
                    <input type="email" name="email" class="form-control mb-2" placeholder="Email">
                    <input type="password" name="password" class="form-control mb-2" placeholder="Password">
                    <input type="password" name="confirm_pw" class="form-control mb-3" placeholder="Confirm PW">
                    <button class="btn btn-primary w-100">Register</button>
                </form>
            </div>
            <div class="col-md-6 ps-md-5">
                <h2 class="text-success">Login</h2>
                <form action="/login" method="POST">
                    {% csrf_token %}
                    <input type="email" name="email" class="form-control mb-2" placeholder="Email">
                    <input type="password" name="password" class="form-control mb-3" placeholder="Password">
                    <button class="btn btn-primary w-100">Login</button>
                </form>
                {% if messages %}
                    {% for m in messages %}<p class="text-danger mt-2 small">{{m}}</p>{% endfor %}
                {% endif %}
            </div>
        </div>
    </div>
</body>
