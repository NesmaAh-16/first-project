<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<nav class="navbar navbar-dark bg-dark px-4 mb-4">
    <h4 class="text-white">Welcome, {{user.first_name}} {{user.last_name}}!</h4>
    <div>
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>
<div class="container mt-5">
    <div class="row">
        <div class="col-md-6">
            <h5 class="mb-2 text-muted">Game name: <span class="text-muted">{{ game.name }}</span></h5>
            <h5 class="mb-2 text-muted">Genre: <span class="mb-2 text-muted">{{ game.genre }}</span></h5>
            <h5 class="mb-2 text-muted">Description:  <span class="mb-2 text-muted">{{ game.desc }}</span></h5>
            <br>
            <h5  class="mb-2 text-muted">Created By: {{game.created_by.first_name}} {{game.created_by.last_name}}</span></h3>
            <br>
            {% if show_button %}
                <a class="btn btn-outline-warning" href="/games/{{game.id}}/edit" >Edit</a>
                <a class="btn btn-outline-danger" href="/games/{{game.id}}/delete" >Delete</a>
            {% endif %}

        </div>
    </div>
</div>
